services:
  - type: web
    name: amrita-curriculum-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: curriculum-chatbot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLAUDE_API_KEY
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: curriculum-chatbot-db
    databaseName: curriculum_chatbot
    plan: free
